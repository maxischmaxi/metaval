name: Release

# Releases are driven by the version field in Cargo.toml.
#
# On every push to main we read the current Cargo.toml version and check
# whether a matching git tag already exists:
#   * no tag yet         -> this is the first / a new version -> release
#   * tag already exists  -> nothing to do
#
# A release runs as a pipeline:
#   check  -> test -> publish -> binaries
#
#   1. check     read the version, decide whether a release is due
#   2. test      run the shared CI (build & test on Linux + macOS) — a
#                publish never happens unless these pass
#   3. publish   cargo publish to crates.io, create the git tag vX.Y.Z and the
#                matching GitHub Release
#   4. binaries  build prebuilt binaries for Linux + macOS and attach them
#
# The tag doubles as the durable record of "already released", which makes the
# whole pipeline idempotent: re-running it for an already-tagged version is a
# no-op, and a partially-failed run recovers on the next run instead of trying
# to publish the same version twice.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required so the publish/binaries jobs can create the tag, the GitHub Release
# and upload assets.
permissions:
  contents: write

# Never run two releases at the same time; don't cancel a publish midway.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      should_release: ${{ steps.guard.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history incl. all tags, needed by the guard

      - name: Read package version from Cargo.toml
        id: meta
        run: |
          version="$(awk -F'"' '/^\[package\]/{p=1} p && /^version[[:space:]]*=/{print $2; exit}' Cargo.toml)"
          if [ -z "$version" ]; then
            echo "::error::Could not read version from Cargo.toml"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Cargo.toml version: $version"

      - name: Decide whether a release is needed
        id: guard
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if [ -n "$(git tag -l "v${VERSION}")" ]; then
            echo "Tag v${VERSION} already exists -> nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag v${VERSION} yet -> a release will be created."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # Tests must pass before anything is published. Reuses the exact same
  # definition as the PR CI (.github/workflows/ci.yml).
  test:
    name: Test
    needs: check
    if: needs.check.outputs.should_release == 'true'
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish to crates.io
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check if this version is already on crates.io
        id: published
        run: |
          name="$(awk -F'"' '/^\[package\]/{p=1} p && /^name[[:space:]]*=/{print $2; exit}' Cargo.toml)"
          # Derive the sparse-index path crates.io uses for this crate name.
          case ${#name} in
            1) path="1/$name" ;;
            2) path="2/$name" ;;
            3) path="3/${name:0:1}/$name" ;;
            *) path="${name:0:2}/${name:2:2}/$name" ;;
          esac
          if curl -sf "https://index.crates.io/$path" | grep -qF "\"vers\":\"${VERSION}\""; then
            echo "v${VERSION} is already on crates.io -> skipping cargo publish."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "v${VERSION} not on crates.io yet -> will publish."
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to crates.io
        if: steps.published.outputs.already == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
        run: cargo publish --locked

      - name: Create git tag & GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --target "$GITHUB_SHA" \
            --title "v${VERSION}" \
            --generate-notes

  binaries:
    name: Binary (${{ matrix.target }})
    needs: [check, publish]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    env:
      VERSION: ${{ needs.check.outputs.version }}
      TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "$TARGET"

      - name: Package tarball + checksum
        run: |
          bin=metaval
          asset="${bin}-${TARGET}"
          mkdir -p dist
          # Stage the binary at the tarball root so it extracts as ./metaval.
          cp "target/${TARGET}/release/${bin}" "${bin}"
          tar -czf "dist/${asset}.tar.gz" "${bin}"
          cd dist
          # Checksum: sha256sum on Linux, shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${asset}.tar.gz" > "${asset}.tar.gz.sha256"
          else
            shasum -a 256 "${asset}.tar.gz" > "${asset}.tar.gz.sha256"
          fi

      - name: Upload binaries to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${VERSION}" dist/* --clobber
